name: Deploy App (Dev)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Dev)" workflow first.

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'infrastructure/**'
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy Next.js → al-hayaat-dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://al-hayaat-dev.azurewebsites.net
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PK_TEST }}

      - name: Verify Stripe env vars bound
        run: |
          if [ -z "${{ secrets.STRIPE_SECRET_KEY_DEV }}" ]; then
            echo "::error::STRIPE_SECRET_KEY_DEV secret is not set"
            exit 1
          fi
          echo "✅ Stripe secrets verified"

      - name: Deploy to Azure Web App (Dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_DEV }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
          package: .

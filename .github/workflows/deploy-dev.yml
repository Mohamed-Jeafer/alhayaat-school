name: Deploy App (Dev)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Dev)" workflow first.

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'infrastructure/**'
      - '**.md'

jobs:
  deploy:
    name: Build & Deploy Next.js → al-hayaat-dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PK_TEST }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: al-hayaat-dev
          package: .

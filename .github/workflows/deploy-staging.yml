name: Deploy App (Staging)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Staging)" workflow first.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "staging" to confirm deployment'
        required: true

jobs:
  deploy:
    name: Build & Deploy Next.js → al-hayaat-staging
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'staging'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://al-hayaat-staging.azurewebsites.net
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PK_TEST }}

      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_STAGING }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_STAGING }}
          package: .

name: Deploy App (Staging)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Staging)" workflow first.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "staging" to confirm deployment'
        required: true

jobs:
  deploy:
    name: Build & Deploy Next.js → al-hayaat-staging
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'staging'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PK_TEST }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: al-hayaat-staging
          package: .

name: Deploy App (Production)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Production)" workflow first.

on:
  push:
    branches: [main]

jobs:
  approve:
    name: Manual Approval Gate
    runs-on: ubuntu-latest
    environment: production   # requires environment protection rule in GitHub

    steps:
      - name: Awaiting approval
        run: echo "Production deployment approved"

  deploy:
    name: Build & Deploy Next.js → al-hayaat-prod
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Stripe production secrets
        run: |
          if [ -z "${{ secrets.STRIPE_SECRET_KEY_PROD }}" ]; then
            echo "::error::STRIPE_SECRET_KEY_PROD not set — deployment blocked"
            exit 1
          fi
          if [ -z "${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}" ]; then
            echo "::error::STRIPE_WEBHOOK_SECRET_PROD not set — deployment blocked"
            exit 1
          fi
          if [ -z "${{ secrets.STRIPE_PK_LIVE }}" ]; then
            echo "::error::STRIPE_PK_LIVE (NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY) not set — deployment blocked"
            exit 1
          fi
          echo "✅ Stripe secrets verified"

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://www.alhayaat.ca
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PK_LIVE }}

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_PROD }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD }}
          package: .

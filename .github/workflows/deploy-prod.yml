name: Deploy App (Production)
# Deploys the Next.js application code to the existing App Service.
# To provision or update Azure infrastructure, run the "Deploy Infrastructure (Production)" workflow first.

on:
  push:
    branches: [master]

jobs:
  approve:
    name: Manual Approval Gate
    runs-on: ubuntu-latest
    environment: production   # requires environment protection rule in GitHub

    steps:
      - name: Awaiting approval
        run: echo "Production deployment approved"

  deploy:
    name: Build & Deploy Next.js → al-hayaat-prod
    runs-on: ubuntu-latest
    needs: approve
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PK_LIVE }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: al-hayaat-prod
          package: .
